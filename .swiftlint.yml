# SwiftLint configuration for swift-graphs
# See https://realm.github.io/SwiftLint/rule-directory.html for all rules.
# Test-specific overrides live in Tests/.swiftlint.yml.

included:
  - Sources
  - Tests

excluded:
  - .build
  - Benchmarks

# ── Opt-in rules ────────────────────────────────────────────────────────────

opt_in_rules:
  - array_init
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_string
  - explicit_init
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - is_disjoint
  - joined_default_parameter
  - last_where
  - literal_expression_end_indentation
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - shorthand_operator
  - sorted_first_last
  - toggle_bool
  - unavailable_function
  - yoda_condition

analyzer_rules:
  - unused_import

# ── Rule configuration ────────────────────────────────────────────────────────

file_length:
  warning: 800
  error: 1500

type_body_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 150
  error: 300

line_length:
  warning: 160
  error: 200
  ignores_comments: true
  ignores_urls: true

# Algorithm type names are intentionally long and descriptive.
type_name:
  min_length:
    warning: 1
    error: 1
  max_length:
    warning: 60
    error: 80

# Graph algorithms use single-letter names (u, v, e, d, g, k…) and
# underscore-prefixed @usableFromInline backing storage (_id, _vertices, …).
identifier_name:
  min_length:
    warning: 1
    error: 1
  max_length:
    warning: 60
    error: 80
  allowed_symbols: ["_"]
  excluded: [i, j, k, n, m, u, v, e, g, d, w, id]

# Graph types nest Iterator inside Sequence inside the graph struct (level 3).
# This is standard Swift practice for lazy custom sequences.
nesting:
  type_level:
    warning: 3
    error: 5

function_parameter_count:
  warning: 8
  error: 12

large_tuple:
  warning: 4
  error: 6

# Algorithms like Tarjan, BellmanFord, and BidirectionalDijkstra are inherently
# complex. The threshold reflects real-world algorithm complexity.
cyclomatic_complexity:
  warning: 20
  error: 40

# ── Disabled rules ─────────────────────────────────────────────────────────

disabled_rules:
  # swift-format owns switch/case alignment — disabling prevents post-format churn.
  - switch_case_alignment

  # swift-format adds trailing commas to multi-line collections; having both tools
  # disagree produces churn on every format pass.
  - trailing_comma

  # for_where overlaps with the UseWhereClausesInForLoops swift-format rule, which
  # we've also disabled. Both styles are used deliberately in this codebase.
  - for_where

  # swift-format handles all whitespace and line formatting.
  - trailing_whitespace
  - vertical_whitespace
  - opening_brace
  - trailing_newline
  - indentation_width

  - todo
  - no_magic_numbers
  - no_extension_access_modifier
