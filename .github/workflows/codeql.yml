name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'  # weekly on Mondays

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (swift)
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      - name: Build
        run: swift build --enable-all-traits

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:swift
