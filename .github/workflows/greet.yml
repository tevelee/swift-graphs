name: Greet new contributors

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          pr-message: |
            👋 Thanks for your first pull request to swift-graphs, @${{ github.actor }}!

            A maintainer will review it shortly. While you wait, please make sure:
            - [ ] `swift test --enable-all-traits` passes locally (this runs the full suite including trait-gated algorithms)
            - [ ] New public API has `///` doc comments
            - [ ] The PR has a label set (helps the automated release notes)

            See [CONTRIBUTING.md](https://github.com/tevelee/swift-graphs/blob/main/CONTRIBUTING.md) for the full guide.
          issue-message: |
            👋 Thanks for opening your first issue in swift-graphs, @${{ github.actor }}!

            A maintainer will take a look soon. To help us respond faster, please make sure your issue includes:
            - Swift version and platform
            - A minimal reproduction case
            - What you expected vs what happened

            For questions and discussion, consider [GitHub Discussions](https://github.com/tevelee/swift-graphs/discussions) instead.
