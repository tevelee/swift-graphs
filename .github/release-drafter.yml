name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "🚀 New algorithms & features"
    labels: ["feature", "enhancement"]
  - title: "🐛 Bug fixes"
    labels: ["fix", "bugfix", "bug"]
  - title: "⚡ Performance"
    labels: ["performance"]
  - title: "🔒 Swift 6 / Sendable"
    labels: ["swift6", "sendable", "concurrency"]
  - title: "📚 Documentation"
    labels: ["documentation", "docs"]
  - title: "🧰 Maintenance"
    labels: ["chore", "ci", "dependencies", "maintenance"]

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels: ["major", "breaking-change"]
  minor:
    labels: ["minor", "feature", "enhancement"]
  patch:
    labels: ["patch", "fix", "bugfix", "bug", "documentation", "maintenance", "ci", "performance"]
  default: patch

exclude-labels:
  - "skip-changelog"

autolabeler:
  - label: "ci"
    files:
      - ".github/**"
  - label: "dependencies"
    files:
      - "Package.swift"
      - "Package@swift-*.swift"
      - "Package.resolved"
  - label: "documentation"
    files:
      - "*.md"
      - "Sources/**/*.docc/**"
  - label: "performance"
    files:
      - "Benchmarks/**"
  - label: "enhancement"
    files:
      - "Sources/**"

template: |
  ## What's changed

  $CHANGES

  <!-- Individual commits are appended automatically by release.yml -->

  **Full Changelog**: https://github.com/tevelee/swift-graphs/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
