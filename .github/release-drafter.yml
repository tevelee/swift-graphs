name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  # Filter out changelog-skip PRs before any other processing.
  - type: pre-exclude
    when:
      labels: ["skip-changelog"]

  # Version resolution rules (not rendered in changelog).
  - type: version-resolver
    semver-increment: major
    when:
      labels: ["major", "breaking-change"]
  - type: version-resolver
    semver-increment: minor
    when:
      labels: ["minor"]
  - type: version-resolver
    semver-increment: patch
    when:
      labels: ["patch"]
  # Default fallback — any unmatched PR bumps patch.
  - type: version-resolver
    semver-increment: patch

  # Changelog sections (also drive version resolution via semver-increment).
  - title: "🚀 New algorithms & features"
    semver-increment: minor
    when:
      labels: ["feature", "enhancement"]
  - title: "🐛 Bug fixes"
    semver-increment: patch
    when:
      labels: ["fix", "bugfix", "bug"]
  - title: "⚡ Performance"
    semver-increment: patch
    when:
      labels: ["performance"]
  - title: "🔒 Swift 6 / Sendable"
    when:
      labels: ["swift6", "sendable", "concurrency"]
  - title: "📚 Documentation"
    semver-increment: patch
    when:
      labels: ["documentation", "docs"]
  - title: "🧰 Maintenance"
    semver-increment: patch
    when:
      labels: ["chore", "ci", "dependencies", "maintenance"]

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'

autolabeler:
  - label: "ci"
    files:
      - ".github/**"
  - label: "dependencies"
    files:
      - "Package.swift"
      - "Package@swift-*.swift"
      - "Package.resolved"
  - label: "documentation"
    files:
      - "*.md"
      - "Sources/**/*.docc/**"
  - label: "performance"
    files:
      - "Benchmarks/**"
  - label: "enhancement"
    files:
      - "Sources/**"

template: |
  ## What's changed

  $CHANGES

  <!-- Individual commits are appended automatically by release.yml -->

  **Full Changelog**: https://github.com/tevelee/swift-graphs/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
